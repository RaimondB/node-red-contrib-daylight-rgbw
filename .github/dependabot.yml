version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 10
  commit-message:
      prefix: "fix"
      prefix-development: "build"
      include: "scope"
  reviewers:
  - raimondb
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
    time: "04:00"
  open-pull-requests-limit: 10
  commit-message:
      prefix: "ci"
      include: "scope"
  reviewers:
  - raimondb
