# Runs the Mocha test suite on every PR to master across supported
# Node.js versions, and publishes a per-version test report check.

name: NPM-CI

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write        # dorny/test-reporter: publish the check run
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test -- --reporter json --reporter-option output=test-results.json
      - name: Mocha Tests-${{ matrix.node-version }}
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Mocha Tests-${{ matrix.node-version }}
          path: test-results.json
          reporter: mocha-json
